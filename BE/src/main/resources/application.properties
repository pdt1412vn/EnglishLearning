spring.application.name=BE
logging.pattern.console=${LOGPATTERN_CONSOLE:%green(%d{HH:mm:ss.SSS}) %yellow(%-5level) %red([%thread]) %blue(%logger{255}) - %msg%n}

# Cau hinh naming strategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Cau hinh ket noi SQL Server
spring.datasource.url=jdbc:sqlserver://localhost;databaseName=EnglishLearning;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123

# KET HOP HIBERNATE + DATA.SQL
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# Chay data.sql sau khi Hibernate da tao/cap nhat bang
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:db/data.sql
spring.sql.init.encoding=UTF-8
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=false
